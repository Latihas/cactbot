name: Sync & Build

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write
      workflows: write
    
    outputs:
      has_changes: ${{ steps.check-changes.outputs.has_changes }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/NewMoe-Technology/cactbot.git

      - name: Fetch upstream changes
        run: |
          git fetch upstream

      - name: Save current commit SHA before merge
        id: pre-merge
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Merge upstream changes
        run: |
          git checkout main
          git merge upstream/main --no-edit --strategy-option theirs

      - name: Check if there are actual changes
        id: check-changes
        run: |
          pre_merge_sha="${{ steps.pre-merge.outputs.sha }}"
          post_merge_sha=$(git rev-parse HEAD)
          
          if [ "$pre_merge_sha" != "$post_merge_sha" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "上游仓库有新更新，将执行编译步骤"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "上游仓库无更新"
          fi
        shell: bash

      - name: Push changes to origin
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.TRIGGER_REPO_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main

  build:
    needs: sync
    runs-on: windows-latest
    permissions:
      contents: write
    if: |
      needs.sync-and-build.outputs.has_changes == 'true' ||
      github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - uses: ./.github/actions/setup-js-env

      - name: Set artifact name
        id: generate_version
        shell: pwsh
        run: |
          $time = (Get-Date).AddHours(8).ToString("yyyyMMddHHmmss")
          $sha = "${{ github.sha }}".Substring(0, 8)
          $version = "$time-$sha"
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Check dependencies cache
        id: cache-dependencies
        uses: actions/cache@v5
        with:
          path: ./plugin/ThirdParty
          key: |
            ${{ runner.os }}-cactbot-${{ hashFiles('./util/fetch_deps.ts', './util/DEPS.json5') }}
          restore-keys: |
            ${{ runner.os }}-cactbot-

      - name: Fetch dependencies
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: npm run fetch-deps

      - name: Set up msbuild
        uses: microsoft/setup-msbuild@v3

      - name: Add Custom Problem Matcher
        run: echo "::add-matcher::.github/matchers/msbuild.json"

      - name: MSBuild
        run: msbuild /p:Configuration=Release /p:Platform=x64 plugin/Cactbot.sln
        shell: cmd

      - name: Build JavaScript UI Module Bundles
        run: npm run build
        timeout-minutes: 10

      - name: Generate artifact
        shell: bash
        run: ./util/publish.sh

      - name: Package cactbot release
        run: |
          cd publish/cactbot-release/cactbot
          7z a cactbot.zip ./

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: ./publish/cactbot-release/cactbot/cactbot.zip
          generate_release_notes: true
          make_latest: true
